<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="projBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39d353">
        <animate attributeName="stop-color" values="#39d353;#36BCF7;#a371f7;#39d353" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#36BCF7">
        <animate attributeName="stop-color" values="#36BCF7;#a371f7;#39d353;#36BCF7" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="3" y="3" width="894" height="164" rx="16" fill="#0d1117" stroke="url(#projBorder)" stroke-width="2.5"/>

  <!-- sprout icon -->
  <g stroke="#39d353" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M79 118 L79 78"/>
    <path d="M79 92 C79 74 62 64 48 66 C50 82 64 92 79 92 Z" fill="#0e4429"/>
    <path d="M79 80 C79 62 96 52 110 54 C108 70 94 80 79 80 Z" fill="#26a641"/>
  </g>

  <!-- org line -->
  <text x="140" y="48" font-size="14" fill="#8b949e">
    <tspan fill="#39d353">◆</tspan>
    <tspan dx="6">dongsooop · Dongyang Mirae Univ. · since 2025.03</tspan>
  </text>

  <!-- title -->
  <text x="140" y="82" font-size="20" font-weight="700" fill="#e6edf3">동숲 — 학교생활을 한 눈에, 대학 통합 커뮤니티 서비스</text>

  <!-- features -->
  <text x="140" y="112" font-size="14" fill="#8b949e">실시간 학사 알림 · AI 시간표 인식 · 팀원 모집 · 과팅 매칭 · 교내 장터 · 맛집 추천</text>

  <!-- stack + role -->
  <text x="140" y="142" font-size="14">
    <tspan fill="#6db33f" font-weight="600">Spring Boot</tspan>
    <tspan fill="#484f58" dx="6">·</tspan>
    <tspan fill="#54c5f8" dx="6" font-weight="600">Flutter</tspan>
    <tspan fill="#484f58" dx="6">·</tspan>
    <tspan fill="#e6edf3" dx="6" font-weight="600">Next.js</tspan>
    <tspan fill="#484f58" dx="6">·</tspan>
    <tspan fill="#3776ab" dx="6" font-weight="600">Python AI</tspan>
    <tspan fill="#484f58" dx="10">—</tspan>
    <tspan fill="#8b949e" dx="10">Backend · Infra · 채팅/검색/학식 · 749+ commits</tspan>
  </text>

  <!-- live pill -->
  <g>
    <rect x="758" y="42" width="96" height="34" rx="17" fill="#238636">
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="782" cy="59" r="4" fill="#ffffff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="820" y="64" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">LIVE</text>
  </g>
  <text x="806" y="100" text-anchor="middle" font-size="13" fill="#8b949e">운영 중 · 5인 팀</text>
</svg>
