<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="danumBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6feb">
        <animate attributeName="stop-color" values="#1f6feb;#a371f7;#36BCF7;#1f6feb" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#36BCF7">
        <animate attributeName="stop-color" values="#36BCF7;#1f6feb;#a371f7;#36BCF7" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="3" y="3" width="894" height="164" rx="16" fill="#0d1117" stroke="url(#danumBorder)" stroke-width="2.5"/>

  <!-- Q&A bubble icon -->
  <g>
    <path d="M44 52 Q44 40 56 40 L102 40 Q114 40 114 52 L114 84 Q114 96 102 96 L70 96 L54 110 L56 96 Q44 96 44 84 Z" fill="none" stroke="#1f6feb" stroke-width="4" stroke-linejoin="round"/>
    <text x="79" y="80" text-anchor="middle" font-size="34" font-weight="700" fill="#36BCF7">?</text>
  </g>

  <!-- org line -->
  <text x="140" y="48" font-size="14" fill="#8b949e">
    <tspan fill="#1f6feb">◆</tspan>
    <tspan dx="6">KJLBK · 동양미래대학교 졸업작품 · 2024.04 – 2024.11</tspan>
  </text>

  <!-- title -->
  <text x="140" y="82" font-size="20" font-weight="700" fill="#e6edf3">다넘 — AI와 이웃이 함께하는 실시간 Q&amp;A 커뮤니티</text>

  <!-- description -->
  <text x="140" y="112" font-size="14" fill="#8b949e">실시간 질문·답변 · AI 자동 답변 · 이웃 기반 지식 공유 플랫폼</text>

  <!-- stack + role -->
  <text x="140" y="142" font-size="14">
    <tspan fill="#6db33f" font-weight="600">Spring Boot</tspan>
    <tspan fill="#484f58" dx="6">·</tspan>
    <tspan fill="#e6edf3" dx="6" font-weight="600">Next.js</tspan>
    <tspan fill="#484f58" dx="10">—</tspan>
    <tspan fill="#8b949e" dx="10">Backend · 244 commits (기여 1위)</tspan>
  </text>

  <!-- capstone pill -->
  <g>
    <rect x="726" y="42" width="128" height="34" rx="17" fill="#1f6feb">
      <animate attributeName="opacity" values="1;0.75;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <text x="790" y="64" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">졸업작품</text>
  </g>
  <text x="790" y="100" text-anchor="middle" font-size="13" fill="#8b949e">Team NOMAD · 5인</text>
</svg>
