<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="ossBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8250df">
        <animate attributeName="stop-color" values="#8250df;#36BCF7;#39d353;#8250df" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#36BCF7">
        <animate attributeName="stop-color" values="#36BCF7;#39d353;#8250df;#36BCF7" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="3" y="3" width="894" height="144" rx="16" fill="#0d1117" stroke="url(#ossBorder)" stroke-width="2.5"/>

  <!-- git-merge icon -->
  <g stroke="#a371f7" stroke-width="4" fill="none">
    <circle cx="52" cy="47" r="7"/>
    <circle cx="52" cy="103" r="7"/>
    <circle cx="106" cy="75" r="7"/>
    <path d="M52 54 L52 96"/>
    <path d="M52 60 Q52 75 70 75 L99 75"/>
  </g>

  <!-- repo -->
  <text x="140" y="48" font-size="14" fill="#8b949e">
    <tspan fill="#39d353">◆</tspan>
    <tspan dx="6">spring-projects / spring-security</tspan>
  </text>

  <!-- PR title -->
  <text x="140" y="80" font-size="20" font-weight="700" fill="#e6edf3">Fix Javadoc warnings in spring-security-acl</text>

  <!-- description -->
  <text x="140" y="112" font-size="14" fill="#8b949e">
    Javadoc 경고 해결 + Zero Warnings 강제화 플러그인 적용
    <tspan dx="12" fill="#39d353">+5</tspan>
    <tspan dx="4" fill="#f85149">−1</tspan>
    <tspan dx="8" fill="#484f58">·</tspan>
    <tspan dx="8">2 files</tspan>
  </text>

  <!-- merged pill -->
  <g>
    <rect x="742" y="42" width="112" height="34" rx="17" fill="#8250df">
      <animate attributeName="opacity" values="1;0.75;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <text x="798" y="64" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">MERGED</text>
  </g>
  <text x="798" y="100" text-anchor="middle" font-size="13" fill="#8b949e">#18493 · 2026.01</text>
</svg>
